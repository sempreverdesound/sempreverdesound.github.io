<!DOCTYPE html>
<html lang="it">

<head>
    <title>SempreVerde</title>
    <link rel="icon" type="image/png" href="res/icon.png">
    <!-- Set Metadata-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Import Styles (Bootstrap, Icons, Custom Style) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="src/style.css" rel="stylesheet">
    <!-- Import Scripts (JQuery, Bootstrap Bundle, Angular, Angular Route, Custom Script) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular-route.min.js"></script>
    <script src="src/script.js"></script>
</head>

<body ng-app="module" ng-controller="controller" class="d-block" style="display: none">
<nav class="navbar navbar-expand fixed-top" style="height: 50px">
    <ul class="navbar-nav d-flex">
        <!-- Home Button -->
        <li class="nav-item active"><a class="nav-link" aria-current="page" href="#">
            <i ng-if="icons" class="bi bi-house-fill"></i>
            <span ng-if="!icons">Home</span>
        </a></li>
        <!-- Songs Dropdown -->
        <li class="nav-item dropdown">
            <button type="button" class="nav-link dropdown-toggle" id="songsLarge"
                    data-bs-toggle="dropdown" aria-expanded="false">
                <i ng-if="icons" class="bi bi-music-note-beamed"></i>
                <span ng-if="!icons">Brani</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="songsLarge">
                <li ng-repeat="song in ::songs">
                    <a class="nav-link dropdown-item" href="#{{song.page}}">{{song.title}}</a>
                </li>
            </ul>
        </li>
        <!-- Materials Dropdown -->
        <li class="nav-item dropdown">
            <button type="button" class="nav-link dropdown-toggle" id="materialsLarge"
                    data-bs-toggle="dropdown" aria-expanded="false">
                <i ng-if="icons" class="bi bi-file-richtext-fill"></i>
                <span ng-if="!icons">Materiali</span>
            </button>
            <ul class="dropdown-menu" aria-labelledby="materialsLarge">
                <li><a class="nav-link dropdown-item" href="#presskit">Press Kit</a></li>
                <li><a class="nav-link dropdown-item" href="#rider">Rider Tecnico</a></li>
                <li><a class="nav-link dropdown-item" href="#photos">Foto</a></li>
            </ul>
        </li>
        <!-- Contacts Button -->
        <li class="nav-item"><a class="nav-link" href="#contacts">
            <i ng-if="icons" class="bi bi-envelope-fill"></i>
            <span ng-if="!icons">Contatti</span>
        </a></li>
    </ul>
</nav>
<!-- Main View-->
<main ng-view class="container-fluid" style="margin-top: 60px"></main>
</body>

</html>
